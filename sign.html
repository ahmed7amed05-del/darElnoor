<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - دار النور</title>
    <!-- Bootstrap CSS RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="home.html">
                <img src="BOKS/شعار_بسيط_كحلي_و_بيج_عن_مكتبة_-removebg-preview.png" alt="دار النور">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="books.html">الكتب</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">عن الموقع</a>
                    </li>
                </ul>
                <div class="nav-actions">
                    <a href="login.html" class="nav-icon" title="تسجيل الدخول">
                        <i class="fas fa-user"></i>
                    </a>
                    <a href="#" class="nav-icon" title="سلة المشتريات">
                        <i class="fas fa-shopping-cart"></i>
                    </a>
                    <a href="sign.html" class="btn-nav-primary">حساب جديد</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Auth Page -->
    <div class="auth-page">
        <div class="container d-flex justify-content-center">
            <div class="auth-card" data-aos="zoom-up" data-aos-duration="800">
                <h2 class="mb-4">إنشاء حساب جديد</h2>
                <form id="signup-form">
                    <div class="mb-3">
                        <label for="fullname" class="form-label">الاسم الكامل</label>
                        <input type="text" class="form-control" id="fullname" placeholder="أدخل اسمك الكامل" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">كلمة المرور</label>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="confirm-password" class="form-label">تأكيد كلمة المرور</label>
                            <input type="password" class="form-control" id="confirm-password" placeholder="••••••••"
                                required>
                        </div>
                    </div>
                    <button type="submit" class="btn-custom py-3" style="font-size:1.1rem; border-radius:15px;">تسجيل
                        وإنشاء الحساب</button>

                    <div class="auth-links mt-4">
                        <p class="text-muted mb-0">لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ once: true });</script>

    <!-- Custom JS -->
    <script src="auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                Swal.fire({
                    title: 'خطأ!',
                    text: 'كلمات المرور غير متطابقة! الرجاء المحاولة مرة أخرى.',
                    icon: 'error',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: 'var(--primary-color)'
                });
                return;
            }

            if (typeof auth !== 'undefined') {
                const result = auth.register(fullname, email, password);
                if (result.success) {
                    Swal.fire({
                        title: 'ممتاز!',
                        text: 'تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول.',
                        icon: 'success',
                        confirmButtonText: 'تسجيل الدخول',
                        confirmButtonColor: 'var(--primary-color)'
                    }).then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    Swal.fire({
                        title: 'خطأ!',
                        text: result.message,
                        icon: 'error',
                        confirmButtonText: 'حسناً',
                        confirmButtonColor: 'var(--primary-color)'
                    });
                }
            }
        });
    </script>

</body>

</html>
